name: CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  analyze_test:
    name: Analyze & Test
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Flutter version
        run: flutter --version

      - name: Pub get
        run: flutter pub get

      # ✅ Не валим CI на warning/info — падаем только на errors
      - name: Analyze (errors only)
        run: flutter analyze --no-fatal-warnings --no-fatal-infos

      # ✅ Запускаем тесты только если есть папка test/
      - name: Test (if any)
        shell: bash
        run: |
          if [ -d "test" ]; then
            flutter test
          else
            echo "No test/ directory -> skipping flutter test"
          fi

  build_android_debug:
    name: Build Android (debug APK)
    runs-on: ubuntu-latest
    needs: analyze_test

    # ✅ увеличиваем таймауты сетевых запросов Gradle (убирает EOF/timeout фейлы)
    env:
      GRADLE_OPTS: >-
        -Dorg.gradle.internal.http.connectionTimeout=60000
        -Dorg.gradle.internal.http.socketTimeout=60000
        -Dorg.gradle.jvmargs="-Xmx3g -Dfile.encoding=UTF-8"
      # иногда полезно, но не обязательно:
      # JAVA_TOOL_OPTIONS: "-Djava.net.preferIPv4Stack=true"

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
          # ✅ ВАЖНО: включает кеш Gradle зависимостей
          cache: gradle

      # ✅ ВАЖНО: стабилизирует gradle wrapper download + кеширует wrapper/caches
      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      # ✅ verbose поможет, если снова упадёт — будет видно на каком URL рвётся
      - name: Build APK (debug)
        run: flutter build apk --debug --verbose

      - name: Upload APK artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-debug-apk
          path: build/app/outputs/flutter-apk/app-debug.apk
          if-no-files-found: error

  build_windows_release:
    name: Build Windows (release)
    runs-on: windows-latest
    needs: analyze_test

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: stable
          cache: true

      - name: Pub get
        run: flutter pub get

      - name: Build Windows (release)
        run: flutter build windows --release

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: windows-release-build
          path: build/windows/x64/runner/Release/
          if-no-files-found: error